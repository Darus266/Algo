<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithme Day 2026 - Côte d'Ivoire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header avec le logo */
        .header {
            background: linear-gradient(135deg, #000000 0%, #1f1f1f 100%);
            padding: 30px 30px 25px;
            text-align: center;
            border-bottom: 4px solid #FFD700;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            border-radius: 12px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .event-date {
            color: #FFD700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .event-location {
            color: #aaaaaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .tagline {
            color: #ffffff;
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 15px;
            opacity: 0.8;
        }

        .form-section {
            padding: 35px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f1f1f;
            font-size: 0.9rem;
        }

        label .required {
            color: #d4af37; /* Or un peu plus sombre pour le contraste */
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
            background: #ffffff;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #000000 0%, #2c2c2c 100%);
            color: #FFD700;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1a1a1a 0%, #3a3a3a 100%);
            color: #FFE55C;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Feedback Messages */
        .message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            display: none; /* Caché par défaut */
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #10b981;
            display: block;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #ef4444;
            display: block;
        }

        @media (max-width: 550px) {
            .form-section {
                padding: 25px;
            }
            .logo {
                max-width: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="https://picsum.photos/seed/algoday2026/300/150.jpg" alt="Algorithme Day Côte d'Ivoire" class="logo">
            </div>
            <div class="event-date">📅 15 OCTOBRE 2026</div>
            <div class="event-location">📍 Abidjan - Plateau, Palais de la Culture</div>
            <div class="tagline">« Vient déposer à nos pieds tout ce qui te dépasse »</div>
        </div>
        
        <div class="form-section">
            <!-- 
                NOTE : Vous pouvez ajouter l'attribut action="votre_script.php" ou similaire 
                si vous souhaitez une soumission classique, ou continuer avec le JS ci-dessous 
                pour un traitement via API.
            -->
            <form id="registrationForm">
                <div class="form-group">
                    <label for="fullname">Nom complet <span class="required">*</span></label>
                    <input type="text" id="fullname" required placeholder="Kouadio Jean-Marc">
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="contact@exemple.com">
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" placeholder="+225 07 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label for="company">Entreprise / Institution</label>
                    <input type="text" id="company" placeholder="Votre organisation">
                </div>
                <div class="form-group">
                    <label for="status">Statut <span class="required">*</span></label>
                    <select id="status" required>
                        <option value="">Sélectionnez votre statut</option>
                        <option value="Étudiant">🎓 Étudiant</option>
                        <option value="Développeur">💻 Développeur / Ingénieur</option>
                        <option value="Chef de projet">📊 Chef de projet</option>
                        <option value="Entrepreneur">🚀 Entrepreneur / Fondateur</option>
                        <option value="Enseignant">📚 Enseignant / Chercheur</option>
                        <option value="Autre">🔧 Autre</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">✨ S'inscrire maintenant ✨</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script>
        // --- UTILITAIRES ---

        // Afficher un message à l'utilisateur
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Masquer après 5 secondes si c'est un succès
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        // --- LOGIQUE D'INSCRIPTION ---

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Empêche le rechargement de la page
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            
            // Récupération des valeurs
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const company = document.getElementById('company').value.trim();
            const status = document.getElementById('status').value;
            
            // Validation basique
            if (!fullname || !email || !status) {
                showMessage('Veuillez remplir tous les champs obligatoires (*)', 'error');
                return;
            }
            
            // Effacer l'ancien message
            document.getElementById('message').style.display = 'none';
            
            // État de chargement sur le bouton
            btn.disabled = true;
            btn.textContent = '⏳ Inscription en cours...';

            try {
                /* 
                   ----------------------------------------------------------
                   IMPORTANT : C'EST ICI QUE VOUS CONNECTEREZ VOTRE BASE DE DONNÉES
                   ----------------------------------------------------------
                   
                   Ci-dessous, une simulation avec fetch (commentée) et un délai.
                   
                   Exemple avec fetch :
                   
                   const response = await fetch('VOTRE_URL_API', {
                       method: 'POST',
                       headers: { 'Content-Type': 'application/json' },
                       body: JSON.stringify({ fullname, email, phone, company, status })
                   });
                   
                   if (!response.ok) throw new Error('Erreur réseau');
                */

                // Simulation d'un délai réseau (à supprimer lors de l'intégration réelle)
                await new Promise(resolve => setTimeout(resolve, 800));

                // Ici, vous pouvez ajouter la logique pour sauvegarder localement si vous le souhaitez,
                // ou simplement supprimer ce bloc localStorage si tout est géré par votre serveur.
                
                console.log("Données prêtes à être envoyées à la BDD :", { fullname, email, phone, company, status });
                
                // Reset du formulaire
                document.getElementById('registrationForm').reset();
                
                // Feedback visuel
                showMessage('✅ Inscription confirmée ! Bienvenue à l\'Algorithme Day 2026 🎉', 'success');

            } catch (error) {
                console.error(error);
                showMessage('Une erreur est survenue lors de l\'inscription. Veuillez réessayer.', 'error');
            } finally {
                // Rétablir le bouton
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
